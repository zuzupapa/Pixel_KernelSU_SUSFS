name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options: [ Actions, Pre-Release, Release ]
        default: Actions
      kernel_build_version:
        description: "Kernel Version to Build"
        type: choice
        options:
          - all
          - tegu - (Pixel 9a)
          - comet - (Pixel 9 Pro Fold)
          - caimito - (Pixel 9 / Pixel 9 Pro / Pixel 9 Pro XL)
          - akita - (Pixel 8a)
          - shusky - (Pixel 8 / Pixel 8 Pro)
          - felix - (Pixel Fold)
          - tangorpro - (Pixel Tablet)
          - lynx - (Pixel 7a)
          - pantah - (Pixel 7 / Pixel 7 Pro)
          - bluejay - (Pixel 6a)
          - raviole - (Pixel 6 / Pixel 6 Pro)
        default: all
      feature_set:
        description: "Feature Set"
        type: choice
        options:
          - KSUN+SUSFS+BBG
          - KSUN+SUSFS
          - KSUN+BBG
          - KSUN
          - BBG
          - None
        default: KSUN+SUSFS+BBG
      ksu_commit:
        description: "KSU Commit (optional)"
        type: string
        default: ""
        required: false

jobs:
  fetch-commits:
    runs-on: ubuntu-latest
    outputs:
      ksu_commit: ${{ steps.fetch.outputs.ksu_commit }}
      anykernel_commit: ${{ steps.fetch.outputs.anykernel_commit }}
      patches_commit: ${{ steps.fetch.outputs.patches_commit }}
      susfs_commit: ${{ steps.fetch.outputs.susfs_commit }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
      - name: Fetch Commits
        id: fetch
        uses: ./.github/actions/fetch-commits
        with:
          ksu_commit: ${{ inputs.ksu_commit }}

  build-tegu:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'tegu - (Pixel 9a)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/tegu.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-comet:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'comet - (Pixel 9 Pro Fold)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/comet.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-caimito:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'caimito - (Pixel 9 / Pixel 9 Pro / Pixel 9 Pro XL)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/caimito.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-akita:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'akita - (Pixel 8a)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/akita.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-shusky:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'shusky - (Pixel 8 / Pixel 8 Pro)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/shusky.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-felix:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'felix - (Pixel Fold)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/felix.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-tangorpro:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'tangorpro - (Pixel Tablet)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/tangorpro.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-lynx:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'lynx - (Pixel 7a)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/lynx.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-pantah:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'pantah - (Pixel 7 / Pixel 7 Pro)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/pantah.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-bluejay:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'bluejay - (Pixel 6a)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/bluejay.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  build-raviole:
    if: ${{ inputs.kernel_build_version == 'all' || inputs.kernel_build_version == 'raviole - (Pixel 6 / Pixel 6 Pro)' }}
    needs: fetch-commits
    uses: ./.github/workflows/prepare.yml
    with:
      config_file: .github/kernel-config/raviole.json
      ksu_commit: ${{ inputs.ksu_commit || needs.fetch-commits.outputs.ksu_commit }}
      anykernel_commit: ${{ needs.fetch-commits.outputs.anykernel_commit }}
      patches_commit: ${{ needs.fetch-commits.outputs.patches_commit }}
      susfs_commit: ${{ needs.fetch-commits.outputs.susfs_commit }}
      feature_set: ${{ inputs.feature_set || 'KSUN+SUSFS+BBG' }}
    secrets: inherit

  rej:
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    needs:
    - build-tegu
    - build-comet
    - build-caimito
    - build-akita
    - build-shusky
    - build-felix
    - build-tangorpro
    - build-lynx
    - build-pantah
    - build-bluejay
    - build-raviole

    steps:
    - name: Download Misc Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./downloaded-artifacts
        pattern: '*-Rejects'
        merge-multiple: false

    - name: Process Reject Artifacts
      run: |
        mkdir -p aio-rejects
        
        # Iterate over Rejects artifacts in downloaded-artifacts
        for dir in ./downloaded-artifacts/*-Rejects; do
            # Ensure it is a directory
            [ -d "$dir" ] || continue
            
            dirname=$(basename "$dir")
            # Process each reject artifact
            
            # Get original name (remove -Rejects suffix)
            original_name=${dirname%-Rejects}
            
            mkdir -p "aio-rejects/$original_name"
            
            # Check for patch-rejects folder (legacy structure) or direct contents
            if [ -d "$dir/patch-rejects" ]; then
              # Legacy structure
                cp -r "$dir/patch-rejects/." "aio-rejects/$original_name/"
            else
              # Current structure
                cp -r "$dir/." "aio-rejects/$original_name/"
            fi
        done
        
        # Zip and upload if we found anything
        if [ "$(ls -A aio-rejects)" ]; then
            # Create a single zip of all rejects
            cd aio-rejects
            zip -r -q -9 ../AIO-REJ.zip .
            cd ..
        else
            echo "No rejects found to upload."
        fi

    - name: Upload AIO-REJ Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AIO-REJ
        path: AIO-REJ.zip
        if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type != 'Actions' }}
    permissions:
      contents: write
    needs:
    - build-tegu
    - build-comet
    - build-caimito
    - build-akita
    - build-shusky
    - build-felix
    - build-tangorpro
    - build-lynx
    - build-pantah
    - build-bluejay
    - build-raviole

    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_NAME: "Pixel GKI2 Kernels With KernelSU-Next & SUSFS v2.1.0"
      RELEASE_BODY: ""
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
    - name: Validate Selected Builds
      run: |
        set -euo pipefail

        failed=0
        current_type="${{ inputs.kernel_build_version }}"

        check_selected() {
          local target="$1"
          local job_name="$2"
          local result="$3"
          
          if [[ "$current_type" == "all" || "$current_type" == "$target" ]]; then
            if [[ "$result" != "success" ]]; then
              echo "Required job $job_name did not succeed (result: $result)"
              failed=1
            fi
          fi
        }

        check_selected "tegu - (Pixel 9a)" "build-tegu" "${{ needs.build-tegu.result }}"
        check_selected "comet - (Pixel 9 Pro Fold)" "build-comet" "${{ needs.build-comet.result }}"
        check_selected "caimito - (Pixel 9 / Pixel 9 Pro / Pixel 9 Pro XL)" "build-caimito" "${{ needs.build-caimito.result }}"
        check_selected "akita - (Pixel 8a)" "build-akita" "${{ needs.build-akita.result }}"
        check_selected "shusky - (Pixel 8 / Pixel 8 Pro)" "build-shusky" "${{ needs.build-shusky.result }}"
        check_selected "felix - (Pixel Fold)" "build-felix" "${{ needs.build-felix.result }}"
        check_selected "tangorpro - (Pixel Tablet)" "build-tangorpro" "${{ needs.build-tangorpro.result }}"
        check_selected "lynx - (Pixel 7a)" "build-lynx" "${{ needs.build-lynx.result }}"
        check_selected "pantah - (Pixel 7 / Pixel 7 Pro)" "build-pantah" "${{ needs.build-pantah.result }}"
        check_selected "bluejay - (Pixel 6a)" "build-bluejay" "${{ needs.build-bluejay.result }}"
        check_selected "raviole - (Pixel 6 / Pixel 6 Pro)" "build-raviole" "${{ needs.build-raviole.result }}"

        if [[ "$failed" -ne 0 ]]; then
          exit 1
        fi

    - name: Free Disk Space
      if: true
      uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
        rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
        rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
        testing: false

    - name: Checkout code
      uses: actions/checkout@v5

    - name: Generate New Tag
      id: tag
      if: inputs.release_type != 'Actions'
      run: |
        LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo "v0.0.0")
        if [[ -z "$LATEST_TAG" || "$LATEST_TAG" == "null" ]]; then
          LATEST_TAG="v0.0.0"
        fi
        
        if [[ "$LATEST_TAG" =~ ^(.*)-r([0-9]+)$ ]]; then
          VERSION="${BASH_REMATCH[1]}"
          REV="${BASH_REMATCH[2]}"
          NEW_REV=$((REV + 1))
          NEW_TAG="${VERSION}-r${NEW_REV}"
        else
          NEW_TAG="${LATEST_TAG}-r1"
        fi
        
        echo "Latest tag: $LATEST_TAG"
        echo "New tag: $NEW_TAG"
        echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Set release body
      run: |
        cat << 'EOF' > release_body.md

        **IMPORTANT DISCLAIMER**
        This software is provided for testing and educational purposes only. Use at your own risk.
        The developers are not responsible for any damage, data loss, or issues that may occur.
        Please ensure you have proper backups before installation.

        Features:
        -> KernelSU-Next Manager, Wild KSU Manager Support is temporary disabled
        -> SUSFS ඞ v2.1.0
        -> SUSFS Inline Hooks
        -> IPSet Support for Advanced Network Filtering
        -> BBRv3 TCP Congestion Control
        -> BBG: https://github.com/vc-teahouse/Baseband-guard

        🔹 BBG (Baseband-guard)
        - A lightweight LSM (Linux Security Module) for Android kernel
        - Blocks unauthorized writes to critical partitions/device nodes
        - Prevents malicious tampering with baseband and boot chain
        - Kernel-level protection via LSM hooks
        - Reduces risk of soft-brick/hard-brick issues

        Kernel Flasher:
        -> https://github.com/fatalcoder524/KernelFlasher/

        Manager:
        Temp Disabled (-> Wild KSU Manager: https://github.com/WildKernels/Wild_KSU)
        -> KernelSU-Next Manager: https://github.com/KernelSU-Next/KernelSU-Next

        Module: 
        -> https://github.com/sidex15/ksu_module_susfs
        EOF

    - name: Download AnyKernel3 Artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets
        pattern: '*-AnyKernel3'
        merge-multiple: false

    - name: Download Boot Image Artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets
        pattern: '*-BootImages'
        merge-multiple: false

    - name: Zip AnyKernel3 for Release
      run: |
        set -e
        shopt -s nullglob

        for dir in release-assets/*-AnyKernel3; do
          zip_name="${dir}.zip"
          rm -f "$zip_name"
          cd "$dir"
          zip -r -q -9 "../$(basename "$zip_name")" .
          cd - >/dev/null
        done

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.new_tag }}
        name: ${{ steps.tag.outputs.new_tag }}
        body_path: release_body.md
        draft: false
        prerelease: ${{ inputs.release_type == 'Pre-Release' }}
        files: |
          release-assets/**/*.zip
          release-assets/**/*-boot*.img
